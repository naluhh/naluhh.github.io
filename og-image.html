<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #18191c;
    --ink-soft: #565656;
    --accent: #00b4ff;
    --accent-deep: #009bdb;
    --accent-light: #ccf0ff;
    --bg: #f6fbfe;
  }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Nunito", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* soft brand glow blobs */
  .blob { position: absolute; border-radius: 50%; filter: blur(8px); opacity: .55; }
  .b1 { width: 520px; height: 520px; top: -180px; right: -120px;
        background: radial-gradient(circle at 30% 30%, var(--accent-light), transparent 70%); }
  .b2 { width: 460px; height: 460px; bottom: -200px; left: -140px;
        background: radial-gradient(circle at 50% 50%, var(--accent-light), transparent 70%); }

  .card { position: relative; text-align: center; padding: 0 80px; }

  .logo { width: 168px; height: 168px; margin: 0 auto 30px; display: block;
          filter: drop-shadow(0 20px 40px rgba(0,180,255,.35)); }

  h1 { font-family: "Fredoka", sans-serif; font-weight: 600;
       font-size: 86px; line-height: 1.02; letter-spacing: -0.5px; }
  h1 .hl { color: var(--accent-deep); }

  p.sub { margin-top: 26px; font-size: 33px; font-weight: 600;
          color: var(--ink-soft); }

  .badge { margin-top: 34px; display: inline-flex; align-items: center; gap: 12px;
           font-size: 22px; font-weight: 700; color: var(--accent-deep);
           background: #fff; border: 2px solid var(--accent-light);
           padding: 13px 26px; border-radius: 999px;
           box-shadow: 0 14px 30px -16px rgba(13,40,60,.3); }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); }
</style>
</head>
